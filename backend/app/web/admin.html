<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temu 数据后台</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap');

    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-soft: #f1f5f9;
      --line: #dbe5f1;
      --line-strong: #c3d4ea;
      --text: #1e3a8a;
      --text-body: #1f2a44;
      --muted: #5b6b8f;
      --primary: #1e40af;
      --primary-strong: #1e3a8a;
      --accent: #f59e0b;
      --accent-soft: rgba(245, 158, 11, 0.14);
      --ok: #15803d;
      --warn: #b45309;
      --err: #b91c1c;
      --shadow: 0 12px 28px rgba(30, 58, 138, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Fira Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text-body);
      background:
        radial-gradient(circle at 92% -8%, rgba(59, 130, 246, 0.12), transparent 34%),
        radial-gradient(circle at -8% 112%, rgba(245, 158, 11, 0.10), transparent 36%),
        var(--bg);
    }

    a { color: var(--primary); }

    .page {
      max-width: 1360px;
      margin: 0 auto;
      padding: 28px 20px 42px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .hero p {
      margin: 10px 0 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill-link,
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      background: var(--surface);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .badge {
      background: var(--accent-soft);
      color: var(--warn);
      border-color: rgba(245, 158, 11, 0.26);
    }

    .grid { display: grid; gap: 14px; }

    .stats {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-bottom: 16px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .stat-card { padding: 14px; }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: "Fira Code", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 26px;
      font-weight: 700;
      color: var(--primary-strong);
      letter-spacing: -0.02em;
    }

    .panels {
      grid-template-columns: 1.2fr 0.8fr;
      margin-bottom: 16px;
    }

    .two-col {
      grid-template-columns: 1fr 1fr;
      margin-bottom: 16px;
    }

    .panel {
      padding: 14px;
      min-height: 220px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .panel h2 {
      margin: 0;
      font-size: 16px;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .panel-note {
      margin: 8px 0 0;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      padding: 10px 11px;
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid var(--line);
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    tbody tr:hover { background: #f9fbff; }

    .mono {
      font-family: "Fira Code", ui-monospace, SFMono-Regular, Menlo, monospace;
      word-break: break-all;
      font-size: 12px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .status-pill.ok {
      color: var(--ok);
      background: rgba(21, 128, 61, 0.10);
      border-color: rgba(21, 128, 61, 0.22);
    }

    .status-pill.running {
      color: var(--primary);
      background: rgba(30, 64, 175, 0.10);
      border-color: rgba(30, 64, 175, 0.22);
    }

    .status-pill.warn {
      color: var(--warn);
      background: rgba(180, 83, 9, 0.10);
      border-color: rgba(180, 83, 9, 0.22);
    }

    .status-pill.err {
      color: var(--err);
      background: rgba(185, 28, 28, 0.10);
      border-color: rgba(185, 28, 28, 0.22);
    }

    .bars { display: grid; gap: 10px; }

    .bar-row { display: grid; gap: 6px; }

    .bar-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .bar-meta strong {
      font-family: "Fira Code", ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--text);
      font-weight: 600;
    }

    .bar-track {
      height: 9px;
      border-radius: 999px;
      overflow: hidden;
      background: #e8eef8;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #1e40af, #3b82f6);
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    .error-view {
      padding: 24px;
      font-family: "Fira Code", ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #b91c1c;
      white-space: pre-wrap;
    }

    .pill-link:focus-visible,
    .badge:focus-visible,
    a:focus-visible {
      outline: 2px solid rgba(245, 158, 11, 0.45);
      outline-offset: 2px;
    }

    @media (max-width: 1100px) {
      .stats,
      .panels,
      .two-col {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .hero {
        flex-direction: column;
        align-items: flex-start;
      }

      .hero-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .page { padding: 20px 12px 28px; }
      .hero h1 { font-size: 24px; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { scroll-behavior: auto; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div>
        <h1>Temu 数据后台</h1>
        <p>查看采集任务、商品快照、联想关系和来源分布。当前版本聚焦高频监控指标，支持快速定位运行状态和数据质量。</p>
      </div>
      <div class="hero-actions">
        <a class="pill-link" href="/admin/products">商品查询页</a>
        <div class="badge" id="latestSnapshotBadge">最近快照：加载中</div>
      </div>
    </div>

    <div class="grid stats">
      <div class="card stat-card"><div class="stat-label">商品总数</div><div class="stat-value" id="statProducts">-</div></div>
      <div class="card stat-card"><div class="stat-label">快照总数</div><div class="stat-value" id="statSnapshots">-</div></div>
      <div class="card stat-card"><div class="stat-label">采集任务</div><div class="stat-value" id="statRuns">-</div></div>
      <div class="card stat-card"><div class="stat-label">联想关系</div><div class="stat-value" id="statEdges">-</div></div>
    </div>

    <div class="grid panels">
      <div class="card panel">
        <div class="panel-head">
          <h2>最近采集任务</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Run UUID</th>
                <th>状态</th>
                <th>开始时间</th>
                <th>结束时间</th>
                <th>采集量</th>
              </tr>
            </thead>
            <tbody id="runsBody"></tbody>
          </table>
        </div>
      </div>
      <div class="card panel">
        <div class="panel-head">
          <h2>来源分布</h2>
        </div>
        <div class="bars" id="sourcesBars"></div>
      </div>
    </div>

    <div class="grid two-col">
      <div class="card panel">
        <div class="panel-head">
          <h2>联想关系 Top</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>From</th>
                <th>To</th>
                <th>类型</th>
                <th>次数</th>
              </tr>
            </thead>
            <tbody id="edgesBody"></tbody>
          </table>
        </div>
      </div>
      <div class="card panel">
        <div class="panel-head">
          <h2>扩展统计</h2>
        </div>
        <div class="table-wrap">
          <table>
            <tbody>
              <tr><th>完成任务</th><td id="completedRuns">-</td></tr>
              <tr><th>related 来源快照</th><td id="relatedSourceCount">-</td></tr>
              <tr><th>快照涉及不同商品</th><td id="distinctSnapshotGoods">-</td></tr>
            </tbody>
          </table>
        </div>
        <p class="panel-note">后续可继续扩展价格历史、销量区间和商品关联链路视图。</p>
      </div>
    </div>

  </div>

  <script>
    const TOKEN_KEY = "temu_admin_token";
    const ROLE_KEY = "temu_admin_role";
    const EMAIL_KEY = "temu_admin_email";
    const fmt = new Intl.NumberFormat("zh-CN");

    function getAdminToken() {
      return sessionStorage.getItem(TOKEN_KEY);
    }

    function authFetch(url, options = {}) {
      const token = getAdminToken();
      if (!token) {
        window.location.href = "/login";
        return Promise.reject(new Error("未登录"));
      }
      return fetch(url, {
        ...options,
        headers: {
          ...(options.headers || {}),
          Authorization: `Bearer ${token}`,
        },
      }).then((res) => {
        if (res.status === 401) {
          sessionStorage.removeItem(TOKEN_KEY);
          sessionStorage.removeItem(ROLE_KEY);
          sessionStorage.removeItem(EMAIL_KEY);
          window.location.href = "/login";
          throw new Error("登录已过期");
        }
        return res;
      });
    }

    async function fetchJson(url) {
      const res = await authFetch(url);
      if (!res.ok) throw new Error(`${url} -> ${res.status}`);
      return res.json();
    }

    function safe(value) {
      return value == null || value === "" ? "-" : value;
    }

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function formatDateTime(value) {
      if (value == null || value === "") return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return safe(value);
      const yyyy = date.getFullYear();
      const MM = pad2(date.getMonth() + 1);
      const dd = pad2(date.getDate());
      const HH = pad2(date.getHours());
      const mm = pad2(date.getMinutes());
      const ss = pad2(date.getSeconds());
      return `${yyyy}-${MM}-${dd} ${HH}:${mm}:${ss}`;
    }

    function statusClass(status) {
      const value = String(status || "").toUpperCase();
      if (value.includes("DONE") || value.includes("SUCCESS") || value.includes("COMPLETED")) return "ok";
      if (value.includes("RUN") || value.includes("START")) return "running";
      if (value.includes("PAUSE") || value.includes("WAIT")) return "warn";
      if (value.includes("FAIL") || value.includes("ERR") || value.includes("STOP")) return "err";
      return "running";
    }

    function renderOverview(data) {
      document.getElementById("statProducts").textContent = fmt.format(data.total_products || 0);
      document.getElementById("statSnapshots").textContent = fmt.format(data.total_snapshots || 0);
      document.getElementById("statRuns").textContent = fmt.format(data.total_runs || 0);
      document.getElementById("statEdges").textContent = fmt.format(data.total_edges || 0);
      document.getElementById("completedRuns").textContent = fmt.format(data.completed_runs || 0);
      document.getElementById("relatedSourceCount").textContent = fmt.format(data.related_sources || 0);
      document.getElementById("distinctSnapshotGoods").textContent = fmt.format(data.distinct_snapshot_goods || 0);
      document.getElementById("latestSnapshotBadge").textContent = `最近快照：${formatDateTime(data.latest_snapshot_at)}`;
    }

    function renderRuns(items) {
      const body = document.getElementById("runsBody");
      body.innerHTML = items.map(item => {
        const status = safe(item.status);
        return `
          <tr>
            <td class="mono">${safe(item.run_uuid)}</td>
            <td><span class="status-pill ${statusClass(status)}">${status}</span></td>
            <td>${formatDateTime(item.started_at)}</td>
            <td>${formatDateTime(item.ended_at)}</td>
            <td>${fmt.format(item.total_collected || 0)}</td>
          </tr>
        `;
      }).join("");
    }

    function renderSources(items) {
      const total = items.reduce((sum, item) => sum + (item.count || 0), 0) || 1;
      const root = document.getElementById("sourcesBars");
      root.innerHTML = items.map(item => {
        const width = ((item.count || 0) / total) * 100;
        return `
          <div class="bar-row">
            <div class="bar-meta">
              <span>${safe(item.source)}</span>
              <strong>${fmt.format(item.count || 0)}</strong>
            </div>
            <div class="bar-track"><div class="bar-fill" style="width:${width}%"></div></div>
          </div>
        `;
      }).join("");
    }

    function renderEdges(items) {
      const body = document.getElementById("edgesBody");
      body.innerHTML = items.map(item => `
        <tr>
          <td class="mono">${safe(item.from_goods_id)}</td>
          <td class="mono">${safe(item.to_goods_id)}</td>
          <td>${safe(item.relation_type)}</td>
          <td>${fmt.format(item.count || 0)}</td>
        </tr>
      `).join("");
    }

    async function boot() {
      if (!getAdminToken()) {
        window.location.href = "/login";
        return;
      }
      const [overview, runs, sources, edges] = await Promise.all([
        fetchJson("/api/dashboard/overview"),
        fetchJson("/api/dashboard/runs"),
        fetchJson("/api/dashboard/sources"),
        fetchJson("/api/dashboard/edges"),
      ]);

      renderOverview(overview);
      renderRuns(runs.items || []);
      renderSources(sources.items || []);
      renderEdges(edges.items || []);
    }

    boot().catch((error) => {
      document.body.innerHTML = `<pre class="error-view">后台页面加载失败\n${error.message}</pre>`;
    });
  </script>
</body>
</html>
