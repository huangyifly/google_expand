<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temu 数据后台</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --line: #e7ecf3;
      --text: #18212f;
      --muted: #607086;
      --accent: #f15a24;
      --accent-soft: rgba(241, 90, 36, 0.12);
      --shadow: 0 14px 36px rgba(17, 24, 39, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(241, 90, 36, 0.08), transparent 32%),
        linear-gradient(180deg, #fcfdff 0%, var(--bg) 48%);
    }
    .page {
      max-width: 1320px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }
    .hero {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-end;
      margin-bottom: 22px;
    }
    .hero h1 {
      margin: 0;
      font-size: 30px;
    }
    .hero p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      max-width: 700px;
      line-height: 1.6;
    }
    .badge {
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .grid {
      display: grid;
      gap: 16px;
    }
    .stats {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-bottom: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }
    .stat-card {
      padding: 18px;
    }
    .stat-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 10px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .panels {
      grid-template-columns: 1.2fr 0.8fr;
      margin-bottom: 20px;
    }
    .panel {
      padding: 18px 18px 16px;
      min-height: 220px;
    }
    .panel h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 12px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #fafbfd;
      color: var(--muted);
      font-size: 12px;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .bars {
      display: grid;
      gap: 10px;
    }
    .bar-row {
      display: grid;
      gap: 6px;
    }
    .bar-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
    }
    .bar-track {
      background: #f0f4f9;
      border-radius: 999px;
      height: 10px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff7a18, #f15a24);
      border-radius: 999px;
    }
    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    input, button {
      font: inherit;
    }
    input {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      background: linear-gradient(135deg, #f15a24, #ff7a18);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .muted {
      color: var(--muted);
      font-size: 12px;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      word-break: break-all;
    }
    .two-col {
      grid-template-columns: 1fr 1fr;
    }
    @media (max-width: 980px) {
      .stats,
      .panels,
      .two-col {
        grid-template-columns: 1fr;
      }
      .hero {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div>
        <h1>Temu 数据后台</h1>
        <p>查看采集任务、商品快照、联想关系和来源分布。这个页面走后端接口取数，后续可以继续扩展图表、导出和更复杂的筛选。</p>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <a class="badge" href="/admin/products" style="text-decoration:none;">商品查询页</a>
        <div class="badge" id="latestSnapshotBadge">最近快照：加载中</div>
      </div>
    </div>

    <div class="grid stats">
      <div class="card stat-card"><div class="stat-label">商品总数</div><div class="stat-value" id="statProducts">-</div></div>
      <div class="card stat-card"><div class="stat-label">快照总数</div><div class="stat-value" id="statSnapshots">-</div></div>
      <div class="card stat-card"><div class="stat-label">采集任务</div><div class="stat-value" id="statRuns">-</div></div>
      <div class="card stat-card"><div class="stat-label">联想关系</div><div class="stat-value" id="statEdges">-</div></div>
    </div>

    <div class="grid panels">
      <div class="card panel">
        <h2>最近采集任务</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Run UUID</th>
                <th>状态</th>
                <th>开始时间</th>
                <th>结束时间</th>
                <th>采集量</th>
              </tr>
            </thead>
            <tbody id="runsBody"></tbody>
          </table>
        </div>
      </div>
      <div class="card panel">
        <h2>来源分布</h2>
        <div class="bars" id="sourcesBars"></div>
      </div>
    </div>

    <div class="grid two-col" style="margin-bottom: 20px;">
      <div class="card panel">
        <h2>联想关系 Top</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>From</th>
                <th>To</th>
                <th>类型</th>
                <th>次数</th>
              </tr>
            </thead>
            <tbody id="edgesBody"></tbody>
          </table>
        </div>
      </div>
      <div class="card panel">
        <h2>扩展统计</h2>
        <div class="table-wrap">
          <table>
            <tbody>
              <tr><th>完成任务</th><td id="completedRuns">-</td></tr>
              <tr><th>related 来源快照</th><td id="relatedSourceCount">-</td></tr>
              <tr><th>快照涉及不同商品</th><td id="distinctSnapshotGoods">-</td></tr>
            </tbody>
          </table>
        </div>
        <p class="muted" style="margin-top: 12px;">这块先放常用聚合指标，后面你想看价格历史、销量区间、某商品联想链路都可以继续扩。</p>
      </div>
    </div>

  </div>

  <script>
    const fmt = new Intl.NumberFormat("zh-CN");

    async function fetchJson(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`${url} -> ${res.status}`);
      return res.json();
    }

    function safe(value) {
      return value == null || value === "" ? "-" : value;
    }

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function formatDateTime(value) {
      if (value == null || value === "") return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return safe(value);
      const yyyy = date.getFullYear();
      const MM = pad2(date.getMonth() + 1);
      const dd = pad2(date.getDate());
      const HH = pad2(date.getHours());
      const mm = pad2(date.getMinutes());
      const ss = pad2(date.getSeconds());
      return `${yyyy}-${MM}-${dd} ${HH}:${mm}:${ss}`;
    }

    function renderOverview(data) {
      document.getElementById("statProducts").textContent = fmt.format(data.total_products || 0);
      document.getElementById("statSnapshots").textContent = fmt.format(data.total_snapshots || 0);
      document.getElementById("statRuns").textContent = fmt.format(data.total_runs || 0);
      document.getElementById("statEdges").textContent = fmt.format(data.total_edges || 0);
      document.getElementById("completedRuns").textContent = fmt.format(data.completed_runs || 0);
      document.getElementById("relatedSourceCount").textContent = fmt.format(data.related_sources || 0);
      document.getElementById("distinctSnapshotGoods").textContent = fmt.format(data.distinct_snapshot_goods || 0);
      document.getElementById("latestSnapshotBadge").textContent = `最近快照：${formatDateTime(data.latest_snapshot_at)}`;
    }

    function renderRuns(items) {
      const body = document.getElementById("runsBody");
      body.innerHTML = items.map(item => `
        <tr>
          <td class="mono">${safe(item.run_uuid)}</td>
          <td>${safe(item.status)}</td>
          <td>${formatDateTime(item.started_at)}</td>
          <td>${formatDateTime(item.ended_at)}</td>
          <td>${fmt.format(item.total_collected || 0)}</td>
        </tr>
      `).join("");
    }

    function renderSources(items) {
      const total = items.reduce((sum, item) => sum + (item.count || 0), 0) || 1;
      const root = document.getElementById("sourcesBars");
      root.innerHTML = items.map(item => {
        const width = ((item.count || 0) / total) * 100;
        return `
          <div class="bar-row">
            <div class="bar-meta">
              <span>${safe(item.source)}</span>
              <strong>${fmt.format(item.count || 0)}</strong>
            </div>
            <div class="bar-track"><div class="bar-fill" style="width:${width}%"></div></div>
          </div>
        `;
      }).join("");
    }

    function renderEdges(items) {
      const body = document.getElementById("edgesBody");
      body.innerHTML = items.map(item => `
        <tr>
          <td class="mono">${safe(item.from_goods_id)}</td>
          <td class="mono">${safe(item.to_goods_id)}</td>
          <td>${safe(item.relation_type)}</td>
          <td>${fmt.format(item.count || 0)}</td>
        </tr>
      `).join("");
    }

    async function boot() {
      const [overview, runs, sources, edges] = await Promise.all([
        fetchJson("/api/dashboard/overview"),
        fetchJson("/api/dashboard/runs"),
        fetchJson("/api/dashboard/sources"),
        fetchJson("/api/dashboard/edges"),
      ]);

      renderOverview(overview);
      renderRuns(runs.items || []);
      renderSources(sources.items || []);
      renderEdges(edges.items || []);
    }

    boot().catch((error) => {
      document.body.innerHTML = `<pre style="padding:24px;font-family:monospace;">后台页面加载失败\n${error.message}</pre>`;
    });
  </script>
</body>
</html>
