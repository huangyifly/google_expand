<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temu 商品查询</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap');

    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-soft: #f1f5f9;
      --line: #dbe5f1;
      --line-strong: #c3d4ea;
      --text: #1e3a8a;
      --text-body: #1f2a44;
      --muted: #5b6b8f;
      --primary: #1e40af;
      --primary-strong: #1e3a8a;
      --accent: #f59e0b;
      --accent-soft: rgba(245, 158, 11, 0.14);
      --ok: #15803d;
      --err: #b91c1c;
      --danger-soft: #fff1f2;
      --danger-line: #fecdd3;
      --shadow: 0 12px 28px rgba(30, 58, 138, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Fira Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text-body);
      background:
        radial-gradient(circle at 92% -8%, rgba(59, 130, 246, 0.12), transparent 34%),
        radial-gradient(circle at -8% 112%, rgba(245, 158, 11, 0.10), transparent 36%),
        var(--bg);
    }

    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 20px 42px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      max-width: 760px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn,
    .btn-link,
    button {
      border: 1px solid transparent;
      border-radius: 10px;
      min-height: 38px;
      padding: 8px 12px;
      background: var(--primary);
      color: #fff;
      font: inherit;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background-color 0.18s ease, opacity 0.18s ease;
    }

    .btn:hover,
    .btn-link:hover,
    button:hover {
      background: var(--primary-strong);
    }

    .btn-link.secondary {
      background: var(--surface);
      border-color: var(--line-strong);
      color: var(--primary);
    }

    .btn-link.secondary:hover {
      background: #eef3fb;
    }

    .btn-link.danger,
    button.danger {
      background: var(--danger-soft);
      color: var(--err);
      border-color: var(--danger-line);
    }

    .btn-link.danger:hover,
    button.danger:hover {
      background: #ffe4e8;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .clear-status {
      margin: 0 0 12px;
      min-height: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .clear-status.ok { color: var(--ok); }
    .clear-status.err { color: var(--err); }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1.6fr) minmax(140px, 0.9fr) minmax(120px, 0.8fr) minmax(120px, 0.7fr) auto;
      gap: 10px;
      margin-bottom: 12px;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      padding: 8px 10px;
      font: inherit;
      background: var(--surface);
      color: var(--text-body);
      min-height: 38px;
    }

    input::placeholder { color: #8a98b3; }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 1;
      white-space: nowrap;
    }

    tbody tr:hover { background: #f9fbff; }

    .mono {
      font-family: "Fira Code", ui-monospace, SFMono-Regular, Menlo, monospace;
      word-break: break-all;
      font-size: 12px;
    }

    .title-cell {
      min-width: 260px;
      line-height: 1.5;
      font-weight: 500;
    }

    .raw-text-cell {
      min-width: 360px;
      max-width: 520px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--muted);
      line-height: 1.5;
    }

    .link-cell {
      min-width: 180px;
      word-break: break-all;
    }

    .detail-links {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 120px;
    }

    .detail-links a {
      color: var(--primary);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
    }

    .detail-links a:hover { text-decoration: underline; }

    .listing-config-cell { min-width: 280px; }

    .listing-config-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .listing-config-grid label {
      display: flex;
      flex-direction: column;
      gap: 3px;
      color: var(--muted);
      font-size: 11px;
    }

    .listing-config-grid input {
      border-radius: 8px;
      padding: 6px 8px;
      min-height: 32px;
      font-size: 12px;
      background: #fff;
    }

    .listing-config-save {
      margin-top: 8px;
      width: 100%;
      min-height: 34px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 12px;
    }

    .listing-config-save:hover { background: #d97706; }

    .pagination {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }

    .pager {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .error-view {
      padding: 24px;
      font-family: "Fira Code", ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--err);
      white-space: pre-wrap;
    }

    input:focus-visible,
    select:focus-visible,
    button:focus-visible,
    .btn-link:focus-visible,
    .detail-links a:focus-visible {
      outline: 2px solid rgba(245, 158, 11, 0.45);
      outline-offset: 1px;
    }

    @media (max-width: 1220px) {
      .toolbar {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }

    @media (max-width: 860px) {
      .hero {
        flex-direction: column;
        align-items: flex-start;
      }

      .actions {
        width: 100%;
        justify-content: flex-start;
      }

      .toolbar {
        grid-template-columns: 1fr 1fr;
      }

      .page { padding: 20px 12px 28px; }
      h1 { font-size: 24px; }
    }

    @media (max-width: 520px) {
      .toolbar { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { scroll-behavior: auto; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div>
        <h1>Temu 商品查询</h1>
        <p>用于商品明细检索、排序浏览和上架参数维护。首页保留总体统计，这里专门进行数据运维操作。</p>
      </div>
      <div class="actions">
        <button id="exportBtn" type="button">导出 Excel</button>
        <button id="clearTemuSiteBtn" class="danger" type="button">清除 Temu Cookie/Session</button>
        <a class="btn-link secondary" href="/admin/users">账号管理</a>
        <a class="btn-link secondary" href="/admin">返回统计首页</a>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <input id="keyword" placeholder="输入 goods_id / 标题关键字" />
        <select id="sortBy">
          <option value="last_seen_at">最后出现</option>
          <option value="updated_at">更新时间</option>
          <option value="goods_id">商品 ID</option>
          <option value="title">标题</option>
          <option value="price_text">价格</option>
          <option value="sales_text">销量文本</option>
          <option value="sales_value">销量值</option>
          <option value="star_rating">星级</option>
          <option value="review_count">评价数</option>
          <option value="listing_time">上架时间</option>
          <option value="raw_text">商品元素文本</option>
          <option value="last_source">来源</option>
        </select>
        <select id="sortOrder">
          <option value="desc">降序</option>
          <option value="asc">升序</option>
        </select>
        <select id="pageSize">
          <option value="20">20 / 页</option>
          <option value="30" selected>30 / 页</option>
          <option value="50">50 / 页</option>
          <option value="100">100 / 页</option>
        </select>
        <button id="searchBtn">查询</button>
      </div>

      <div class="meta">
        <div id="summary">加载中...</div>
        <div id="sortSummary">排序：-</div>
      </div>
      <div id="clearTemuSiteStatus" class="clear-status"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>商品 ID</th>
              <th>标题</th>
              <th>价格</th>
              <th>销量文本</th>
              <th>销量值</th>
              <th>星级</th>
              <th>评价数</th>
              <th>上架时间</th>
              <th>上架参数</th>
              <th>详情页</th>
              <th>商品元素文本</th>
              <th>来源</th>
              <th>最后出现</th>
            </tr>
          </thead>
          <tbody id="productsBody"></tbody>
        </table>
      </div>

      <div class="pagination">
        <div id="pageInfo">第 1 页</div>
        <div class="pager">
          <button id="prevBtn">上一页</button>
          <button id="nextBtn">下一页</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const TOKEN_KEY = "temu_admin_token";
    const ROLE_KEY = "temu_admin_role";
    const EMAIL_KEY = "temu_admin_email";
    const fmt = new Intl.NumberFormat("zh-CN");
    const state = {
      page: 1,
      pageSize: 30,
      keyword: "",
      sortBy: "last_seen_at",
      sortOrder: "desc",
      totalPages: 1,
      total: 0,
    };

    function getAdminToken() {
      return sessionStorage.getItem(TOKEN_KEY);
    }

    function authFetch(url, options = {}) {
      const token = getAdminToken();
      if (!token) {
        window.location.href = "/login";
        return Promise.reject(new Error("未登录"));
      }
      return fetch(url, {
        ...options,
        headers: {
          ...(options.headers || {}),
          Authorization: `Bearer ${token}`,
        },
      }).then((res) => {
        if (res.status === 401) {
          sessionStorage.removeItem(TOKEN_KEY);
          sessionStorage.removeItem(ROLE_KEY);
          sessionStorage.removeItem(EMAIL_KEY);
          window.location.href = "/login";
          throw new Error("登录已过期");
        }
        return res;
      });
    }

    async function fetchJson(url) {
      const res = await authFetch(url);
      if (!res.ok) throw new Error(`${url} -> ${res.status}`);
      return res.json();
    }

    function setClearTemuSiteStatus(message, type = "") {
      const status = document.getElementById("clearTemuSiteStatus");
      status.textContent = message;
      status.className = `clear-status ${type}`.trim();
    }

    function requestClearTemuSiteData() {
      return new Promise((resolve, reject) => {
        const requestId = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        const timer = window.setTimeout(() => {
          window.removeEventListener("message", handleMessage);
          reject(new Error("未收到扩展响应，请确认 Temu 数据采集扩展已安装并刷新本页。"));
        }, 10000);

        function handleMessage(event) {
          if (event.source !== window) return;
          if (event.data?.type !== "TEMU_EXTENSION_CLEAR_SITE_DATA_RESULT") return;
          if (event.data.requestId !== requestId) return;
          window.clearTimeout(timer);
          window.removeEventListener("message", handleMessage);
          if (event.data.ok) {
            resolve(event.data.details || {});
            return;
          }
          reject(new Error(event.data.error || "清理 Temu 站点数据失败。"));
        }

        window.addEventListener("message", handleMessage);
        window.postMessage({
          type: "TEMU_EXTENSION_CLEAR_SITE_DATA",
          requestId,
        }, window.location.origin);
      });
    }

    function safe(value) {
      return value == null || value === "" ? "-" : value;
    }

    function formatNumber(value) {
      return value == null || value === "" ? "-" : fmt.format(Number(value));
    }

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function formatDateTime(value) {
      if (value == null || value === "") return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return safe(value);
      const yyyy = date.getFullYear();
      const MM = pad2(date.getMonth() + 1);
      const dd = pad2(date.getDate());
      const HH = pad2(date.getHours());
      const mm = pad2(date.getMinutes());
      const ss = pad2(date.getSeconds());
      return `${yyyy}-${MM}-${dd} ${HH}:${mm}:${ss}`;
    }

    function extractTemuDetailUrl(rawHtml) {
      if (!rawHtml) return "";
      const match = String(rawHtml).match(/<a\b[^>]*\bhref\s*=\s*["']([^"']+)["']/i);
      if (!match || !match[1]) return "";
      const href = match[1].trim().replace(/&amp;/g, "&");
      if (!href || /^javascript:/i.test(href)) return "";
      if (/^https?:\/\//i.test(href)) return href;
      return `https://www.temu.com/${href.replace(/^\/+/, "")}`;
    }

    function renderDetailLink(rawHtml) {
      const url = extractTemuDetailUrl(rawHtml);
      if (!url) return "-";
      return `<a href="${url}" target="_blank" rel="noopener noreferrer">查看详情</a>`;
    }

    function renderTemuSearchLink(goodsId) {
      if (!goodsId) return "-";
      const url = `https://www.temu.com/ca/search_result.html?search_key=${encodeURIComponent(goodsId)}`;
      return `<a href="${url}" target="_blank" rel="noopener noreferrer">Temu 链接 2</a>`;
    }

    function renderDetailLinks(item) {
      return `
        <div class="detail-links">
          ${renderDetailLink(item.raw_html)}
          ${renderTemuSearchLink(item.goods_id)}
        </div>
      `;
    }

    function renderListingConfig(item) {
      const fields = [
        ["listing_length_cm", "最长边(cm)"],
        ["listing_width_cm", "次长边(cm)"],
        ["listing_height_cm", "最短边(cm)"],
        ["listing_weight_g", "重量(g)"],
        ["listing_declared_price", "申报价"],
        ["listing_suggested_price", "建议零售价"],
      ];
      return `
        <div class="listing-config-grid" data-goods-id="${safe(item.goods_id)}">
          ${fields.map(([key, label]) => `
            <label>
              <span>${label}</span>
              <input data-listing-field="${key}" value="${safe(item[key]) === "-" ? "" : safe(item[key])}" inputmode="decimal" />
            </label>
          `).join("")}
        </div>
        <button class="listing-config-save" type="button" data-save-listing-config="${safe(item.goods_id)}">保存参数</button>
      `;
    }

    function buildUrl() {
      const params = new URLSearchParams({
        q: state.keyword,
        page: String(state.page),
        page_size: String(state.pageSize),
        sort_by: state.sortBy,
        sort_order: state.sortOrder,
      });
      return `/api/dashboard/products?${params.toString()}`;
    }

    function renderTable(items) {
      const body = document.getElementById("productsBody");
      body.innerHTML = items.map(item => `
        <tr>
          <td class="mono">${safe(item.goods_id)}</td>
          <td class="title-cell">${safe(item.title)}</td>
          <td>${safe(item.price_text)}</td>
          <td>${safe(item.sales_text)}</td>
          <td class="mono">${formatNumber(item.sales_value)}</td>
          <td>${safe(item.star_rating)}</td>
          <td>${safe(item.review_count)}</td>
          <td>${formatDateTime(item.listing_time)}</td>
          <td class="listing-config-cell">${renderListingConfig(item)}</td>
          <td class="link-cell">${renderDetailLinks(item)}</td>
          <td class="raw-text-cell">${safe(item.raw_text)}</td>
          <td>${safe(item.last_source)}</td>
          <td>${formatDateTime(item.last_seen_at)}</td>
        </tr>
      `).join("");
    }

    function syncControls() {
      document.getElementById("keyword").value = state.keyword;
      document.getElementById("sortBy").value = state.sortBy;
      document.getElementById("sortOrder").value = state.sortOrder;
      document.getElementById("pageSize").value = String(state.pageSize);
      document.getElementById("prevBtn").disabled = state.page <= 1;
      document.getElementById("nextBtn").disabled = state.page >= state.totalPages;
      document.getElementById("pageInfo").textContent = `第 ${state.page} / ${Math.max(state.totalPages, 1)} 页`;
      document.getElementById("summary").textContent = `共 ${fmt.format(state.total)} 条商品`;
      document.getElementById("sortSummary").textContent = `排序：${state.sortBy} / ${state.sortOrder}`;
    }

    async function saveListingConfig(goodsId, button) {
      const container = document.querySelector(`.listing-config-grid[data-goods-id="${CSS.escape(goodsId)}"]`);
      if (!container) return;

      const payload = {};
      container.querySelectorAll("[data-listing-field]").forEach((input) => {
        payload[input.dataset.listingField] = input.value.trim();
      });

      button.disabled = true;
      const previousText = button.textContent;
      button.textContent = "保存中...";
      try {
        const response = await authFetch(`/api/dashboard/products/${encodeURIComponent(goodsId)}/listing-config`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          throw new Error(error.detail || `保存失败：${response.status}`);
        }
        button.textContent = "已保存";
        setTimeout(() => {
          button.textContent = previousText;
        }, 1200);
      } catch (error) {
        button.textContent = "保存失败";
        alert(error.message);
        setTimeout(() => {
          button.textContent = previousText;
        }, 1200);
      } finally {
        button.disabled = false;
      }
    }

    async function loadProducts() {
      const data = await fetchJson(buildUrl());
      state.total = data.total || 0;
      state.totalPages = data.total_pages || 1;
      renderTable(data.items || []);
      syncControls();
    }

    function buildExportUrl() {
      const params = new URLSearchParams({
        q: state.keyword,
        sort_by: state.sortBy,
        sort_order: state.sortOrder,
      });
      return `/api/dashboard/products/export?${params.toString()}`;
    }

    async function exportExcel() {
      const btn = document.getElementById("exportBtn");
      btn.disabled = true;
      const prev = btn.textContent;
      btn.textContent = "导出中...";
      try {
        const res = await authFetch(buildExportUrl());
        if (!res.ok) throw new Error(`导出失败：${res.status}`);
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        const disposition = res.headers.get("Content-Disposition") || "";
        const match = disposition.match(/filename="([^"]+)"/);
        a.download = match ? match[1] : "temu_products.xlsx";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (err) {
        alert(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = prev;
      }
    }

    function submitSearch(resetPage = true) {
      state.keyword = document.getElementById("keyword").value.trim();
      state.sortBy = document.getElementById("sortBy").value;
      state.sortOrder = document.getElementById("sortOrder").value;
      state.pageSize = Number(document.getElementById("pageSize").value);
      if (resetPage) state.page = 1;
      loadProducts().catch(renderError);
    }

    function renderError(error) {
      document.body.innerHTML = `<pre class="error-view">商品页加载失败\n${error.message}</pre>`;
    }

    document.getElementById("exportBtn").addEventListener("click", exportExcel);
    document.getElementById("searchBtn").addEventListener("click", () => submitSearch(true));
    document.getElementById("clearTemuSiteBtn").addEventListener("click", async () => {
      const button = document.getElementById("clearTemuSiteBtn");
      button.disabled = true;
      setClearTemuSiteStatus("正在清除 Temu Cookie、Local Storage、Session Storage 和本地站点数据...");
      try {
        const details = await requestClearTemuSiteData();
        setClearTemuSiteStatus(
          `已清除 Temu 站点数据：Cookie ${details.cookies || 0} 个，Local Storage 已清除，Session Storage 已处理 ${details.framesCleared || 0} 个页面上下文。`,
          "ok"
        );
      } catch (error) {
        setClearTemuSiteStatus(error.message, "err");
      } finally {
        button.disabled = false;
      }
    });
    document.getElementById("keyword").addEventListener("keydown", (event) => {
      if (event.key === "Enter") submitSearch(true);
    });
    document.getElementById("sortBy").addEventListener("change", () => submitSearch(true));
    document.getElementById("sortOrder").addEventListener("change", () => submitSearch(true));
    document.getElementById("pageSize").addEventListener("change", () => submitSearch(true));
    document.getElementById("prevBtn").addEventListener("click", () => {
      if (state.page > 1) {
        state.page -= 1;
        loadProducts().catch(renderError);
      }
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      if (state.page < state.totalPages) {
        state.page += 1;
        loadProducts().catch(renderError);
      }
    });
    document.getElementById("productsBody").addEventListener("click", (event) => {
      const button = event.target.closest("[data-save-listing-config]");
      if (!button) return;
      saveListingConfig(button.dataset.saveListingConfig, button);
    });

    if (!getAdminToken()) {
      window.location.href = "/login";
    } else {
      loadProducts().catch(renderError);
    }
  </script>
</body>
</html>
