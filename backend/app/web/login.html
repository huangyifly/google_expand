<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - Temu 后台</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700&display=swap');
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --line: #dbe5f1;
      --text: #1f2a44;
      --muted: #5b6b8f;
      --primary: #1e40af;
      --err: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Fira Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 90% -8%, rgba(59, 130, 246, 0.12), transparent 34%),
        radial-gradient(circle at -10% 110%, rgba(245, 158, 11, 0.10), transparent 38%),
        var(--bg);
    }
    .card {
      width: min(92vw, 420px);
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      padding: 20px;
      box-shadow: 0 12px 28px rgba(30, 58, 138, 0.08);
    }
    h1 { margin: 0 0 8px; font-size: 22px; }
    p { margin: 0 0 14px; color: var(--muted); font-size: 13px; }
    label { display: block; margin-bottom: 6px; font-size: 12px; color: var(--muted); }
    input {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      font: inherit;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      min-height: 40px;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: #fff;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #error {
      min-height: 18px;
      margin-top: 10px;
      color: var(--err);
      font-size: 12px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Temu 管理后台登录</h1>
    <p>登录后可访问 /admin 与 /admin/products。</p>
    <label for="email">邮箱</label>
    <input id="email" type="email" placeholder="admin@example.com" />
    <label for="password">密码</label>
    <input id="password" type="password" placeholder="请输入密码" />
    <button id="loginBtn" type="button">登录</button>
    <div id="error"></div>
  </div>

  <script>
    const TOKEN_KEY = "temu_admin_token";
    const ROLE_KEY = "temu_admin_role";
    const EMAIL_KEY = "temu_admin_email";

    async function doLogin(email, password) {
      const response = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.detail || "登录失败");
      }
      sessionStorage.setItem(TOKEN_KEY, data.access_token);
      sessionStorage.setItem(ROLE_KEY, data.role || "user");
      sessionStorage.setItem(EMAIL_KEY, data.email || email);
      window.location.href = "/admin/products";
    }

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const btn = document.getElementById("loginBtn");
      const err = document.getElementById("error");
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      err.textContent = "";
      if (!email || !password) {
        err.textContent = "请输入邮箱和密码";
        return;
      }
      btn.disabled = true;
      btn.textContent = "登录中...";
      try {
        await doLogin(email, password);
      } catch (error) {
        err.textContent = error.message || "登录失败";
      } finally {
        btn.disabled = false;
        btn.textContent = "登录";
      }
    });
  </script>
</body>
</html>
